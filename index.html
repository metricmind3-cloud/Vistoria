<script>
    // 1. INICIALIZAÇÃO DO BANCO DE DADOS PROFISSIONAL
    const dbName = "RSI_Enterprise_DB";
    let db;
    const requestDB = indexedDB.open(dbName, 1);
    
    requestDB.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("vistorias")) {
            db.createObjectStore("vistorias", { keyPath: "id" });
        }
    };
    
    requestDB.onsuccess = (e) => { 
        db = e.target.result;
        carregarHistorico(); 
    };

    // 2. FUNÇÃO OTIMIZADA PARA SALVAR VISTORIA
    function salvarAlteracoesNoCRM() {
        const vistoria = {
            id: Date.now(),
            data: document.getElementById('res-data').value,
            serie: document.getElementById('res-serial').value,
            modelo: document.getElementById('res-modelo').value,
            km: document.getElementById('res-contador-total').value,
            vistoriador: document.getElementById('res-vistoriador').value,
            observacoes: document.getElementById('res-obs').value,
            fotos: fotos // Suas fotos em base64 compactadas
        };

        const transaction = db.transaction(["vistorias"], "readwrite");
        transaction.objectStore("vistorias").put(vistoria);
        transaction.oncomplete = () => {
            alert('✅ Salvo no banco de dados com segurança!');
            carregarHistorico();
        };
    }

    // 3. LIMPEZA SEGURA (SEM TRAVAR)
    function limparBancoAntigo() {
        if (!confirm('Deseja remover vistorias com mais de 30 dias?')) return;
        const transaction = db.transaction(["vistorias"], "readwrite");
        const store = transaction.objectStore("vistorias");
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                // Lógica de data (30 dias)
                cursor.continue();
            }
        };
        alert("Limpeza concluída.");
    }

    // (Mantenha o restante das suas funções de Câmera aqui...)
</script>
