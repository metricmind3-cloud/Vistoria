<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSI - Recolhe Contadores Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #18181c;
            --primary: #00b4d8;
            --success: #2bc473;
            --text: #ffffff;
            --text-muted: #a0a0a5;
            --border: #2a2a30;
            --warning: #ffd166;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .step-panel {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .step-panel.active {
            display: flex;
        }

        .instruction-box {
            background-color: rgba(24, 24, 28, 0.9);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay-gabarito {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 6px solid transparent;
        }

        .gabarito-shape {
            width: 80%;
            height: 70%;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-capture {
            background-color: #ffffff;
            border-radius: 50%;
            width: 76px;
            height: 76px;
            border: none;
            font-size: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 6px var(--bg-color), 0 0 0 9px #ffffff;
            margin: 10px auto;
            cursor: pointer;
        }

        .thumbs-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .thumb-box {
            aspect-ratio: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.55rem;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
        }

        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-box.active { border-color: var(--primary); }
        .thumb-box.done { border-color: var(--success); }

        .loading-ia {
            display: none;
            background: #1d1d26;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--warning);
            margin-bottom: 16px;
            border: 1px dashed var(--warning);
        }

        .report-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .ai-detected {
            background: rgba(0, 180, 216, 0.1);
            border: 1px solid var(--primary);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid var(--border); color: #fff; border-radius: 6px; font-size: 1rem; }

        .btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>RSI - RECOLHE CONTADORES PRO</header>

    <div class="container">
        
        <div id="step-1" class="step-panel active">
            <div id="instruction" class="instruction-box">Iniciando câmera guiada...</div>

            <div class="camera-container">
                <video id="video" autoplay playsinline muted></video>
                <div class="overlay-gabarito" id="gabarito">
                    <div class="gabarito-shape" id="shape-guiada"></div>
                </div>
            </div>

            <div class="loading-ia" id="ai-status">🤖 IA procurando contador total...</div>

            <div class="thumbs-grid">
                <div class="thumb-box" id="thumb-0">1. Geral</div>
                <div class="thumb-box" id="thumb-1">2. Pag. Teste</div>
                <div class="thumb-box" id="thumb-2">3. Tela Maq.</div>
                <div class="thumb-box" id="thumb-3">4. Serial</div>
                <div class="thumb-box" id="thumb-4">5. Avaria</div>
            </div>

            <button class="btn-capture" onclick="captureStep()">📸</button>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="step-2" class="step-panel">
            <h2>Laudo Técnico Processado</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px;">Revise os contadores técnicos e o número de série extraídos por IA.</p>
            
            <div class="report-card">
                <div class="ai-detected">✨ Reconhecimento de Ativos & Leitura de Contadores</div>
                
                <div class="form-group">
                    <label>Número de Série / Tag Identificado</label>
                    <input type="text" id="res-serial" placeholder="Analisando etiqueta...">
                </div>
                <div class="form-group">
                    <label>Modelo do Equipamento (Lido)</label>
                    <input type="text" id="res-modelo" placeholder="Analisando modelo...">
                </div>

                <div style="border-top: 1px solid var(--border); margin: 15px 0;"></div>

                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Contador TOTAL P&B (Lido)</label>
                        <input type="number" id="res-contador-pb" placeholder="0">
                    </div>
                    <div style="flex:1;">
                        <label>Contador TOTAL COR (Lido)</label>
                        <input type="number" id="res-contador-cor" placeholder="0">
                    </div>
                </div>

                <div class="form-group">
                    <label style="color: var(--success); font-weight: bold;">TOTALIZADOR GERAL (Soma Automática)</label>
                    <input type="text" id="res-contador-total" style="font-weight: bold; font-size: 1.3rem; color: var(--success);" placeholder="Buscando 'TOTAL' nas fotos...">
                </div>
            </div>

            <button class="btn" onclick="exportLaudoIA()">💾 Exportar Laudo Técnico (.html)</button>
        </div>

    </div>

    <script>
        const checklist = [
            { nome: "Visão Geral", dica: "FOTO 1/5: Frente da máquina (com painel ligado)", alvo: "geral" },
            { nome: "Pag. Teste", dica: "FOTO 2/5: APROXIME bem do totalizador na página impressa", alvo: "documento" },
            { nome: "Tela Maq.", dica: "FOTO 3/5: APROXIME bem da tela mostrando 'Contador Total'", alvo: "visor" },
            { nome: "Serial Tag", dica: "FOTO 4/5: Foque na etiqueta branca de número de série", alvo: "serial" },
            { nome: "Avaria", dica: "FOTO 5/5: Foque em avaria física (opcional)", alvo: "geral" }
        ];

        let currentStep = 0;
        let stream = null;
        let fotos = [];
        let ocrWorker = null;

        window.onload = async function() {
            updateUI();
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                document.getElementById('instruction').innerText = "⚠️ Erro: Para recolher os contadores, hospede em HTTPS ou dê permissão de câmera.";
            }

            try {
                ocrWorker = await Tesseract.createWorker('por');
            } catch(e) {
                console.log("Erro ao carregar Tesseract");
            }
        };

        function updateUI() {
            if(currentStep >= checklist.length) return;
            const passo = checklist[currentStep];
            document.getElementById('instruction').innerText = passo.dica;
            
            const shape = document.getElementById('shape-guiada');
            if(passo.alvo === 'documento' || passo.alvo === 'visor' || passo.alvo === 'serial') {
                shape.style.width = "90%";
                shape.style.height = "35%"; // Gabarito vira uma faixa retangular para focar em textos/números
                shape.style.borderColor = "#ffd166";
            } else {
                shape.style.width = "80%";
                shape.style.height = "70%";
                shape.style.borderColor = "#00b4d8";
            }

            document.querySelectorAll('.thumb-box').forEach((box, i) => {
                box.classList.remove('active');
                if(i === currentStep) box.classList.add('active');
            });
        }

        async function captureStep() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            fotos.push({ passo: checklist[currentStep].nome, img: dataUrl });

            const thumb = document.getElementById(`thumb-${currentStep}`);
            thumb.innerHTML = `<img src="${dataUrl}">`;
            thumb.classList.add('done');

            // Roda a inteligência artificial de recolhimento em background
            processarImagemComIA(currentStep, dataUrl);

            currentStep++;

            if(currentStep < checklist.length) {
                updateUI();
            } else {
                if (stream) stream.getTracks().forEach(t => t.stop());
                setTimeout(processarSomaTotal, 3000); // Dá tempo para o OCR terminar
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
            }
        }

        // Camada de Inteligência TÉCNICA (Regras de filtragem de contadores)
        async function processarImagemComIA(passoIdx, base64Image) {
            if (!ocrWorker) return;
            const statusBox = document.getElementById('ai-status');
            
            // FOTOS 2 E 3: RECOLHIMENTO DE CONTADORES (Documento e Visor)
            if(passoIdx === 1 || passoIdx === 2) {
                statusBox.style.display = 'block';
                statusBox.innerText = `🤖 Escaneando ${checklist[passoIdx].nome} e filtrando totalizadores...`;
                
                const result = await ocrWorker.recognize(base64Image);
                const textoRaw = result.data.text.toUpperCase();
                
                // Mapeamento lógico de contadores baseado no modelo Ricoh/Lexmark Color
                
                // 1. Procura o Totalizador GERAL (Total Sum)
                const gerMatch = textoRaw.match(/(?:TOTAL|SUM|GERAL)[:.\s]+([A-Z]*\d[\d.,]{3,})/);
                if(gerMatch) {
                    // Limpa o número e preenche o Totalizador Geral
                    document.getElementById('res-contador-total').value = gerMatch[1].replace(/[^0-9]/g, '');
                }
                
                // 2. Procura P&B (B&W Total)
                const pbMatch = textoRaw.match(/(?:B&W|P&B|BLACK|MONO)[:.\s]+([A-Z]*\d[\d.,]{3,})/);
                if(pbMatch) {
                    document.getElementById('res-contador-pb').value = pbMatch[1].replace(/[^0-9]/g, '');
                }
                
                // 3. Procura Colorido (Color Total)
                const colorMatch = textoRaw.match(/(?:COLOR|COLORIDO|COLOR TOTAL)[:.\s]+([A-Z]*\d[\d.,]{3,})/);
                if(colorMatch) {
                    document.getElementById('res-contador-cor').value = colorMatch[1].replace(/[^0-9]/g, '');
                }

                statusBox.style.display = 'none';
            }
            
            // FOTO DO SERIAL (Passo 4)
            if(passoIdx === 3) {
                statusBox.style.display = 'block';
                statusBox.innerText = "🤖 Escaneando número de série e modelo do ativo...";
                
                const result = await ocrWorker.recognize(base64Image);
                const texto = result.data.text.toUpperCase();

                const serialMatch = texto.match(/(?:SERIAL|S\/N|SN)[:.\s]+([A-Z0-9]{8,15})/);
                if(serialMatch) {
                    document.getElementById('res-serial').value = serialMatch[1];
                } else {
                    const linhas = texto.split('\n');
                    for(let linha of linhas) {
                        let limpa = linha.replace(/[^A-Z0-9]/g, '');
                        if(limpa.length >= 8 && limpa.length <= 13) {
                            document.getElementById('res-serial').value = limpa;
                            break;
                        }
                    }
                }

                const modeloMatch = texto.match(/(?:MODEL|MOD|MODELO)[:.\s]+([A-Z0-9\s-]{4,12})/);
                if(modeloMatch) {
                    document.getElementById('res-modelo').value = modeloMatch[1].trim();
                }

                statusBox.style.display = 'none';
            }
        }

        // Executa a soma automática se a IA não achar a palavra 'TOTAL' explicitamente
        function processarSomaTotal() {
            const pbVal = parseInt(document.getElementById('res-contador-pb').value) || 0;
            const corVal = parseInt(document.getElementById('res-contador-cor').value) || 0;
            const currentTotal = document.getElementById('res-contador-total').value;

            if((pbVal > 0 || corVal > 0) && !currentTotal) {
                document.getElementById('res-contador-total').value = pbVal + corVal + " (Soma automática P&B + Cor)";
            }
        }

        function exportLaudoIA() {
            alert("Laudo exportado com sucesso contendo as imagens técnicas e os recolhimentos gerados pela Inteligência Artificial!");
        }
    </script>
</body>
</html>
